            if(activeBtn) activeBtn.classList.add('active');

            // Sync mobile select

            // Render content
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = data[pageId] || '<h1>Page Not Found</h1>';
            
            // Re-initialize Lucide icons for newly injected HTML
            lucide.createIcons();
            
            // Render any applicable charts
            initCharts(pageId);
        }

        let activeCharts = [];
